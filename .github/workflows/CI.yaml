name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Koka (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Koka (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -sSL -o "$env:TEMP\install-koka.bat" https://github.com/koka-lang/koka/releases/latest/download/install.bat
          & "$env:TEMP\install-koka.bat"
          "$env:LOCALAPPDATA\koka\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install Hica (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cladam.github.io/hica/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Hica (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -fsSL -o "$env:TEMP\install-hica.ps1" https://cladam.github.io/hica/install.ps1
          & "$env:TEMP\install-hica.ps1"
          "$env:LOCALAPPDATA\hica" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Verify tools
        run: |
          koka --version
          hica --version
        shell: bash

      - name: Run tests
        shell: bash
        continue-on-error: ${{ runner.os == 'Windows' }}
        run: |
          set +e
          failed=0
          for f in tests/test_*.hc; do
            echo "=== $f ==="
            output=$(hica test "$f" 2>&1)
            echo "$output"
            if echo "$output" | grep -q 'failed'; then
              failed=1
            fi
          done
          exit $failed

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
